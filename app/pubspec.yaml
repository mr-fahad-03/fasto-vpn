name: fasto_vpn_app
description: Fasto VPN mobile app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.2.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  purchases_flutter: ^8.4.0
  google_mobile_ads: ^5.2.0
  package_info_plus: ^8.1.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/fasto_logo.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/fasto_logo.png"